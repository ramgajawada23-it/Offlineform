<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Dashboard | Onboarding Agreement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #dad1d1;
            --primary-light: #1c486e;
            --primary-dark: #1c486e;
            --secondary:#1c486e
            --bg-light: #f1f5f9;
            --card-bg: #ffffff;
            --header-bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, #ffffff, #ffffff);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            padding: 40px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(to right, #1311a7, #ac2121);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 16px;
        }

        .content {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .section {
            margin-bottom: 32px;
        }

        .section h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-light);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section h2::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            background: #fff;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        .file-upload-wrapper {
            position: relative;
            padding: 20px;
            border: 2px dashed var(--border);
            border-radius: 16px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .file-upload-wrapper:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .setting-item {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
        }

        .setting-item span {
            display: block;
            color: var(--text-muted);
            font-size: 11px;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .setting-item strong {
            color: var(--text-main);
            font-weight: 500;
        }

        .recipient-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .recipient-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .badge {
            padding: 4px 12px;
            background: var(--primary);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .footer {
            padding: 30px 40px;
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-send {
            padding: 16px 40px;
            background:#1c486e;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(3, 28, 112, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-send:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.5);
        }

        .btn-send:active {
            transform: translateY(0);
        }

        .btn-send:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .status-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            background: #10b981;
            color: white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 1000;
            animation: fadeInRight 0.3s ease-out;
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header class="header">
            <h1>Onboarding Form</h1>
            <p class="subtitle">Prepare and send agreement for electronic signature</p>
        </header>

        <div class="content">
            <!-- Left Column: Details & Settings -->
            <div class="left-col">
                <div class="section">
                    <h2>Agreement Details</h2>

                    <div class="form-group">
                        <label>Candidate Form Link</label>
                        <div style="position: relative;">
                            <input type="text" id="formLink" value="http://localhost:8080/index.html"
                                placeholder="Enter form URL...">
                            <span style="position: absolute; right: 12px; top: 11px; cursor: help;"
                                title="This link will be sent in the email">🔗</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Agreement Name</label>
                        <input type="text" id="agreementName" value="Onboarding Form">
                    </div>

                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="message" placeholder="Please sign the onboarding document attached."></textarea>
                    </div>
                </div>

                <div class="section">
                    <h2>Agreement Settings</h2>
                    <div class="settings-grid">
                        <div class="setting-item">
                            <span>Completion deadline</span>
                            <strong>None</strong>
                        </div>
                        <div class="setting-item">
                            <span>Reminder frequency</span>
                            <strong>None</strong>
                        </div>
                        <div class="setting-item">
                            <span>Password</span>
                            <strong>None</strong>
                        </div>
                        <div class="setting-item">
                            <span>Signature type</span>
                            <strong>Electronic</strong>
                        </div>
                        <div class="setting-item">
                            <span>Language</span>
                            <strong>English</strong>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Recipients & CC -->
            <div class="right-col">
                <div class="section">
                    <h2>Add Recipients</h2>

                    <div class="recipient-card">
                        <div class="recipient-header">
                            <label>Candidate</label>
                            <span class="badge">Signer</span>
                        </div>
                        <input type="email" id="candidateEmail" placeholder="candidate@email.com">
                    </div>

                    <div class="recipient-card">
                        <div class="recipient-header">
                            <label>HR Manager</label>
                            <select style="width: auto; padding: 4px 12px; font-size: 11px; height: auto;">
                                <option>Approver</option>
                                <option>Signer</option>
                            </select>
                        </div>
                        <input type="email" id="hrEmail" placeholder="hr@company.com">
                    </div>
                </div>

                <div class="section">
                    <h2>CC</h2>
                    <div class="form-group">
                        <label>CC Emails (separated by comma)</label>
                        <input type="text" id="ccEmails" placeholder="finance@company.com, legal@company.com">
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <button class="btn-send" id="sendBtn" onclick="sendForm()">
                <div class="loader" id="loader"></div>
                <span id="btnText">Send Now</span>
                <span style="font-size: 18px;">➔</span>
            </button>
        </footer>
    </div>

    <div id="toast" class="status-toast"></div>

    <script>
        function sendForm() {
            const btn = document.getElementById('sendBtn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            const toast = document.getElementById('toast');

            const data = {
                agreementName: document.getElementById('agreementName').value,
                message: document.getElementById('message').value,
                formLink: document.getElementById('formLink').value,
                candidateEmail: document.getElementById('candidateEmail').value,
                hrEmail: document.getElementById('hrEmail').value,
                ccEmails: document.getElementById('ccEmails').value
            };

            if (!data.candidateEmail || !data.candidateEmail.includes('@')) {
                showToast("Please enter a valid candidate email.", "#ef4444");
                return;
            }

            // UI Loading state
            btn.disabled = true;
            loader.style.display = "block";
            btnText.innerText = "Processing...";

            fetch("/api/send-form", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
                .then(async res => {
                    const text = await res.text();
                    if (res.ok) {
                        showToast("Agreement sent successfully!", "#10b981");
                    } else {
                        showToast("Error: " + text, "#ef4444");
                    }
                })
                .catch(err => {
                    showToast("Network error occurred.", "#ef4444");
                })
                .finally(() => {
                    btn.disabled = false;
                    loader.style.display = "none";
                    btnText.innerText = "Send Now";
                });
        }

        function showToast(msg, bg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = bg;
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 4000);
        }
    </script>
</body>

</html>
